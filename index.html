<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PSYCHE — Il Gioco della Mente</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville:wght@400;700&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#2c1e14;--bg2:#3a2a1c;--bg3:#4a3628;
--card-bg:#f4ead5;--card-bg2:#e8dcc4;--card-border:#b8986a;
--parchment:#f0e6d0;--parchment-dark:#d4c4a0;
--es:#a83232;--io:#b8860b;--superio:#4a6741;
--gold:#c9a84c;--gold-light:#e0c878;--gold-dim:#8a7034;
--burgundy:#6b2d3e;--burgundy-light:#8c3d52;
--velvet:#4a1a2a;--velvet2:#3d1522;
--cream:#f5efe0;--cream-dim:#c8b898;
--text-dark:#2c1e14;--text-medium:#5a4632;--text-light:#8a7456;
--danger:#8b2020;--success:#4a6741;
--font-display:'Playfair Display',Georgia,serif;
--font-body:'Libre Baskerville',Georgia,serif;
--font-accent:'Cormorant Garamond',Georgia,serif;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font-body);background:var(--bg);color:var(--cream)}
#app::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.4}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative;max-width:500px;margin:0 auto;
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 40%,var(--bg3) 100%);
  border-left:1px solid rgba(201,168,76,.1);border-right:1px solid rgba(201,168,76,.1)}
.art-nouveau-line{height:20px;background:transparent;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0 20px}
.art-nouveau-line svg{width:100%;height:16px;opacity:.5}
.stats-bar{padding:8px 16px 2px;flex-shrink:0;position:relative;z-index:10}
.stats-bar .age-display{text-align:center;font-family:var(--font-accent);font-size:17px;color:var(--gold-light);margin-bottom:2px;letter-spacing:2px;font-weight:600}
.stats-bar .phase-label{text-align:center;font-size:11px;color:var(--cream-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:3px;font-family:var(--font-accent)}
.stat-row{display:flex;align-items:center;margin-bottom:4px;gap:8px}
.stat-label{width:72px;font-size:12px;font-weight:700;text-align:right;flex-shrink:0;font-family:var(--font-accent);letter-spacing:1px}
.stat-label.es{color:var(--es)}.stat-label.io{color:var(--io)}.stat-label.superio{color:var(--superio)}
.stat-bar-outer{flex:1;height:12px;background:rgba(244,234,213,.08);border-radius:2px;overflow:hidden;position:relative;border:1px solid rgba(201,168,76,.15)}
.stat-bar-inner{height:100%;border-radius:1px;transition:width .5s ease}
.stat-bar-inner.es{background:linear-gradient(90deg,#6b2020,var(--es))}
.stat-bar-inner.io{background:linear-gradient(90deg,#7a5a10,var(--io))}
.stat-bar-inner.superio{background:linear-gradient(90deg,#2d4028,var(--superio))}
.stat-val{width:24px;font-size:12px;font-weight:700;text-align:left;flex-shrink:0;font-family:var(--font-accent);color:var(--cream-dim)}
.card-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:10px 16px;min-height:0}
.card{position:absolute;width:calc(100% - 32px);max-width:360px;
  background:var(--card-bg);
  background-image:radial-gradient(ellipse at 30% 20%,rgba(232,220,196,.6),transparent 60%),
    url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='p'%3E%3CfeTurbulence baseFrequency='0.8' numOctaves='4' type='fractalNoise'/%3E%3CfeColorMatrix values='0 0 0 0 0.9 0 0 0 0 0.85 0 0 0 0 0.75 0 0 0 0.06 0'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23p)'/%3E%3C/svg%3E");
  border-radius:4px;padding:22px 20px 18px;cursor:grab;user-select:none;touch-action:none;
  box-shadow:0 4px 20px rgba(0,0,0,.4),0 0 0 1px var(--card-border),inset 0 1px 0 rgba(255,255,255,.3);
  transition:opacity .25s;display:flex;flex-direction:column;max-height:calc(100% - 10px);overflow-y:auto;
  border:2px solid var(--card-border);color:var(--text-dark)}
.card.dragging{cursor:grabbing;transition:none}
.card::after{content:'';position:absolute;inset:8px;border:1px solid rgba(184,152,106,.3);border-radius:2px;pointer-events:none}
.card-phase{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--text-light);margin-bottom:4px;font-family:var(--font-accent);font-weight:600}
.card-title{font-family:var(--font-display);font-size:20px;font-weight:700;line-height:1.3;margin-bottom:8px;color:var(--text-dark)}
.card-desc{font-size:14px;line-height:1.55;color:var(--text-medium);margin-bottom:14px}
.card-divider{text-align:center;margin:0 0 12px;color:var(--card-border);font-size:14px;letter-spacing:6px;opacity:.5}
.card-choices{display:flex;gap:10px;margin-top:auto;position:relative;z-index:2}
.card-choices .choice-btn{flex:1;padding:11px 8px;border:none;border-radius:3px;font-family:var(--font-body);font-size:13px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;line-height:1.3;min-height:46px;display:flex;align-items:center;justify-content:center;text-align:center}
.choice-btn.left{background:linear-gradient(135deg,var(--velvet),var(--velvet2));color:var(--cream);border:1px solid rgba(201,168,76,.25);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.choice-btn.right{background:linear-gradient(135deg,var(--burgundy),var(--burgundy-light));color:var(--cream);border:1px solid rgba(201,168,76,.25);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.choice-btn:active{transform:scale(.96)}
.card-preview{position:absolute;bottom:0;left:0;right:0;padding:8px 14px;border-radius:0 0 4px 4px;font-size:12px;font-weight:600;text-align:center;opacity:0;transition:opacity .15s;pointer-events:none;z-index:3}
.card-preview.left{background:rgba(74,26,42,.9);color:var(--cream)}
.card-preview.right{background:rgba(107,45,62,.9);color:var(--cream)}
.card-preview.show{opacity:1}
.swipe-hint{position:absolute;top:50%;transform:translateY(-50%);font-size:24px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:5;color:var(--gold)}
.swipe-hint.left{left:6px}.swipe-hint.right{right:6px}
.bottom-bar{flex-shrink:0;padding:6px 16px 10px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-height:72px;overflow-y:auto}
.badge{font-size:10px;padding:3px 8px;border-radius:2px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:var(--font-accent);letter-spacing:.5px;text-transform:uppercase}
.badge.defense{background:rgba(74,103,65,.2);color:#8ab87a;border:1px solid rgba(74,103,65,.35)}
.badge.psycho{background:rgba(139,32,32,.2);color:#d48a8a;border:1px solid rgba(139,32,32,.35)}
.overlay{position:fixed;inset:0;background:rgba(20,12,8,.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(3px)}
.modal{background:linear-gradient(145deg,var(--card-bg),var(--card-bg2));border-radius:4px;padding:26px 22px;max-width:380px;width:100%;max-height:85vh;overflow-y:auto;
  box-shadow:0 12px 48px rgba(0,0,0,.6);border:2px solid var(--card-border);color:var(--text-dark);position:relative}
.modal::after{content:'';position:absolute;inset:8px;border:1px solid rgba(184,152,106,.2);border-radius:2px;pointer-events:none}
.modal h2{font-family:var(--font-display);font-size:21px;margin-bottom:6px;color:var(--text-dark)}
.modal h3{font-size:14px;font-weight:700;margin:12px 0 4px;color:var(--gold-dim);font-family:var(--font-accent);text-transform:uppercase;letter-spacing:1px}
.modal p{font-size:14px;line-height:1.55;color:var(--text-medium);margin-bottom:8px}
.modal .effect{font-size:13px;color:var(--success);font-weight:700}
.modal .neg-effect{color:var(--danger)}
.modal-close{display:block;margin:16px auto 0;padding:10px 32px;border:none;border-radius:3px;
  background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--bg);
  font-family:var(--font-accent);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;
  box-shadow:0 2px 8px rgba(0,0,0,.2);position:relative;z-index:2}
#title-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;
  background:var(--bg);background-image:radial-gradient(ellipse at 50% 80%,rgba(74,26,42,.3),transparent 60%),radial-gradient(ellipse at 50% 20%,rgba(58,42,28,.5),transparent 50%);
  padding:30px;text-align:center}
.couch-illustration{margin-bottom:20px;opacity:.7}
#title-screen h1{font-family:var(--font-display);font-size:44px;font-weight:900;color:var(--gold-light);margin-bottom:4px;letter-spacing:4px;text-shadow:0 2px 12px rgba(201,168,76,.3)}
#title-screen .subtitle{font-size:13px;color:var(--cream-dim);margin-bottom:20px;letter-spacing:4px;text-transform:uppercase;font-family:var(--font-accent)}
.title-ornament{color:var(--gold-dim);font-size:16px;letter-spacing:8px;margin-bottom:16px;opacity:.5}
#title-screen .tagline{font-size:14px;color:var(--cream-dim);line-height:1.7;margin-bottom:28px;max-width:340px;font-family:var(--font-body)}
.play-btn{padding:14px 48px;border:none;border-radius:3px;background:linear-gradient(135deg,var(--burgundy),var(--burgundy-light));color:var(--cream);font-family:var(--font-accent);font-size:17px;font-weight:700;cursor:pointer;letter-spacing:2px;text-transform:uppercase;box-shadow:0 4px 20px rgba(107,45,62,.4);transition:transform .15s;border:1px solid rgba(201,168,76,.3)}
.play-btn:active{transform:scale(.95)}
#gameover-screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:var(--bg);background-image:radial-gradient(ellipse at 50% 50%,rgba(58,42,28,.4),transparent 60%);padding:30px;text-align:center}
#gameover-screen.show{display:flex}
#gameover-screen h1{font-family:var(--font-display);font-size:30px;color:var(--danger);margin-bottom:6px;letter-spacing:2px}
#gameover-screen .go-cause{font-size:14px;color:var(--cream-dim);margin-bottom:16px;line-height:1.6;max-width:340px}
#gameover-screen .go-summary{font-size:13px;color:var(--cream-dim);margin-bottom:20px;line-height:1.7;max-width:340px}
#gameover-screen .go-summary b{color:var(--gold-light)}
#gameover-screen.natural h1{color:var(--gold-light)}
.notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:3px;font-size:13px;font-weight:700;z-index:150;opacity:0;transition:opacity .3s,top .3s;pointer-events:none;max-width:90%;text-align:center;font-family:var(--font-accent);letter-spacing:.5px;border:1px solid rgba(201,168,76,.2)}
.notif.show{opacity:1;top:30px}
.notif.defense-notif{background:rgba(74,103,65,.85);color:#c8e0b8}
.notif.psycho-notif{background:rgba(107,32,32,.85);color:#e8b8b8}
.notif.save-notif{background:rgba(138,112,52,.85);color:var(--cream)}
</style>
</head>
<body>
<div id="app">
  <div id="title-screen">
    <div class="couch-illustration">
      <svg width="200" height="100" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 60 Q20 40 38 37 L155 32 Q175 30 178 45 L180 58 Q180 66 174 68 L28 72 Q20 72 20 66Z" fill="#5a3a28" stroke="#8a6a4a" stroke-width="1.5"/>
        <path d="M26 56 Q30 42 40 40 L152 35 Q168 33 170 44 L172 56" fill="#6b4a34" stroke="#8a6a4a" stroke-width="1"/>
        <path d="M14 62 Q6 62 6 50 L9 28 Q11 16 22 16 L32 16 Q38 16 38 24 L36 58" fill="#4a2a18" stroke="#8a6a4a" stroke-width="1.5"/>
        <ellipse cx="30" cy="42" rx="13" ry="9" fill="#8c3d52" stroke="#a85a6a" stroke-width="1" opacity=".8"/>
        <rect x="4" y="74" width="182" height="8" rx="1" fill="#6b2d3e" opacity=".35"/>
        <rect x="16" y="75" width="22" height="6" rx="1" fill="#8a5a3a" opacity=".25"/>
        <rect x="48" y="75" width="32" height="6" rx="1" fill="#c9a84c" opacity=".18"/>
        <rect x="90" y="75" width="28" height="6" rx="1" fill="#8a5a3a" opacity=".25"/>
        <rect x="128" y="75" width="38" height="6" rx="1" fill="#4a6741" opacity=".18"/>
        <rect x="24" y="72" width="4" height="14" rx="1" fill="#3a2010"/>
        <rect x="164" y="70" width="4" height="16" rx="1" fill="#3a2010"/>
        <line x1="26" y1="86" x2="26" y2="93" stroke="#c9a84c" stroke-width=".8" opacity=".35"/>
        <line x1="166" y1="86" x2="166" y2="93" stroke="#c9a84c" stroke-width=".8" opacity=".35"/>
      </svg>
    </div>
    <h1>PSYCHE</h1>
    <div class="subtitle">Il Gioco della Mente</div>
    <div class="title-ornament">&#10086; &#10022; &#10086;</div>
    <div class="tagline">Vivi un'intera vita attraverso le tue scelte. Bilancia le forze psichiche di Es, Io e Super-Io. Sopravvivi ai conflitti interiori e affronta le ombre del tuo inconscio.</div>
    <button class="play-btn" onclick="startGame()">Inizia la Seduta</button>
  </div>
  <div id="gameover-screen">
    <h1 id="go-title">FINE</h1>
    <div class="go-cause" id="go-cause"></div>
    <div class="go-summary" id="go-summary"></div>
    <button class="play-btn" onclick="restartGame()">Nuova Seduta</button>
  </div>
  <div class="stats-bar" id="stats-bar">
    <div class="age-display" id="age-display">Età: 5</div>
    <div class="phase-label" id="phase-label">Infanzia</div>
    <div class="stat-row"><div class="stat-label es">ES</div><div class="stat-bar-outer"><div class="stat-bar-inner es" id="bar-es" style="width:50%"></div></div><div class="stat-val" id="val-es">5</div></div>
    <div class="stat-row"><div class="stat-label io">IO</div><div class="stat-bar-outer"><div class="stat-bar-inner io" id="bar-io" style="width:50%"></div></div><div class="stat-val" id="val-io">5</div></div>
    <div class="stat-row"><div class="stat-label superio">SUPER-IO</div><div class="stat-bar-outer"><div class="stat-bar-inner superio" id="bar-superio" style="width:50%"></div></div><div class="stat-val" id="val-superio">5</div></div>
  </div>
  <div class="art-nouveau-line"><svg viewBox="0 0 300 16" xmlns="http://www.w3.org/2000/svg"><path d="M0 8 Q30 2 60 8 Q75 12 90 8 Q105 2 120 8 Q135 14 150 8 Q165 2 180 8 Q195 14 210 8 Q225 2 240 8 Q270 14 300 8" stroke="#c9a84c" stroke-width="0.8" fill="none" opacity=".4"/><circle cx="150" cy="8" r="2" fill="#c9a84c" opacity=".4"/></svg></div>
  <div class="card-area" id="card-area">
    <div class="swipe-hint left" id="hint-left">&#9666;</div>
    <div class="swipe-hint right" id="hint-right">&#9656;</div>
  </div>
  <div class="bottom-bar" id="bottom-bar"></div>
</div>
<div class="notif" id="notif"></div>
<script>
let G={es:5,io:5,superio:5,age:5,phase:0,cards:0,defenses:[],psychos:[],alive:true,deathSaves:{}};
const PHASES=["Infanzia","Adolescenza","Prima Età Adulta","Età Adulta","Vecchiaia"];
const clamp=(v,a=0,b=10)=>Math.max(a,Math.min(b,v));
const DEFENSES={
rimozione:{name:"Rimozione",desc:"La mente allontana dalla coscienza ricordi e impulsi troppo dolorosi, come se non fossero mai esistiti.",effect:"Le carte che abbassano l'IO di 2+ punti vengono ridotte di 1 punto.",fx:s=>{}},
proiezione:{name:"Proiezione",desc:"Attribuisci agli altri sentimenti o impulsi che in realtà sono tuoi. È più facile vedere i difetti fuori che dentro.",effect:"Quando l'ES sale sopra 8, il Super-Io non scende. Salvataggio da morte 1 volta.",fx:s=>{}},
sublimazione:{name:"Sublimazione",desc:"Trasformi impulsi primitivi in attività socialmente accettabili: arte, sport, lavoro creativo.",effect:"Ogni scelta che alza l'ES di 2+ alza anche l'IO di 1.",fx:s=>{}},
umorismo:{name:"Umorismo",desc:"Ridi delle difficoltà come scudo contro il dolore. Una battuta può salvare la psiche dal crollo.",effect:"Salvataggio da morte per collasso psichico 1 volta. Le perdite di IO sono ridotte di 1.",fx:s=>{}},
intellettualizzazione:{name:"Intellettualizzazione",desc:"Analizzi tutto razionalmente per evitare di sentire le emozioni. La logica diventa il tuo rifugio.",effect:"Il Super-Io non può scendere sotto 3. +1 IO permanente.",fx:s=>{s.io=clamp(s.io+1)}},
negazione:{name:"Negazione",desc:"Rifiuti di accettare una realtà dolorosa. Se non la vedi, non esiste... almeno per un po'.",effect:"Salvataggio da morte 1 volta. Le psicopatologie si attivano 1 carta dopo.",fx:s=>{}},
regressione:{name:"Regressione",desc:"Torni a comportamenti di fasi precedenti della vita quando lo stress è troppo forte.",effect:"Quando l'IO scende sotto 4, recuperi +1 IO automaticamente.",fx:s=>{}},
formazione_reattiva:{name:"Formazione Reattiva",desc:"Trasformi un impulso inaccettabile nel suo esatto opposto. Odi qualcuno? Lo tratti con gentilezza esagerata.",effect:"Quando l'ES sale, il Super-Io sale della stessa quantità (max +1).",fx:s=>{}},
spostamento:{name:"Spostamento",desc:"Dirigi emozioni intense verso un bersaglio meno minaccioso. Non puoi arrabbiarti col capo, ma col cuscino sì.",effect:"Le perdite di Super-Io sono ridotte di 1 punto.",fx:s=>{}},
razionalizzazione:{name:"Razionalizzazione",desc:"Trovi spiegazioni logiche e accettabili per comportamenti dettati da impulsi inconsci.",effect:"+1 Super-Io permanente. Le scelte che alzano ES non abbassano Super-Io.",fx:s=>{s.superio=clamp(s.superio+1)}},
identificazione:{name:"Identificazione con l'Aggressore",desc:"Adotti i tratti di chi ti minaccia per sentirti meno vulnerabile. Se non puoi batterli, diventa come loro.",effect:"+2 ES permanente ma -1 IO. L'ES non può scendere sotto 3.",fx:s=>{s.es=clamp(s.es+2);s.io=clamp(s.io-1)}},
scissione:{name:"Scissione",desc:"Dividi il mondo in tutto buono o tutto cattivo, senza sfumature. Le persone sono angeli o demoni.",effect:"Gli effetti delle carte sono amplificati: +1 a ogni modifica positiva, -1 a ogni negativa.",fx:s=>{}}
};
const PSYCHOS={
narcisismo:{name:"Narcisismo",desc:"Un senso grandioso di sé maschera un IO fragile. L'ES domina con bisogni di ammirazione costante.",effect:"L'IO perde 1 punto extra ogni 3 carte.",cond:s=>s.es>=8&&s.io<=4},
nevrosi_ossessiva:{name:"Nevrosi Ossessiva",desc:"Il Super-Io ipertrofico genera rituali, dubbi e sensi di colpa paralizzanti.",effect:"Il Super-Io non può più scendere naturalmente. -1 ES ogni 4 carte.",cond:s=>s.superio>=9&&s.es<=3},
isteria:{name:"Isteria di Conversione",desc:"Conflitti psichici repressi si manifestano nel corpo: paralisi, cecità, dolori senza causa organica.",effect:"-1 IO ogni 4 carte. Le carte di relazione hanno effetti doppi.",cond:s=>s.superio>=7&&s.es>=7&&s.io<=4},
ansia_generalizzata:{name:"Ansia Generalizzata",desc:"L'IO è troppo debole per mediare tra Es e Super-Io. Un'angoscia diffusa pervade ogni momento.",effect:"-1 IO ogni 3 carte. Ogni scelta costa 1 IO extra.",cond:s=>s.io<=3},
depressione:{name:"Depressione Maggiore",desc:"L'aggressività del Super-Io si rivolge contro il sé. Tutto sembra vuoto e senza speranza.",effect:"-1 IO e -1 ES ogni 4 carte. Le scelte positive hanno effetto dimezzato.",cond:s=>s.superio>=8&&s.es<=2&&s.io<=5},
disturbo_borderline:{name:"Disturbo Borderline",desc:"L'identità è frammentata tra idealizzazione e svalutazione. Le emozioni oscillano violentemente.",effect:"Le statistiche oscillano di ±1 casualmente ogni 2 carte.",cond:s=>s.es>=7&&s.io<=3&&s.superio<=4},
fobia:{name:"Disturbo Fobico",desc:"L'angoscia viene proiettata su un oggetto specifico. Evitare diventa l'unico modo per sopravvivere.",effect:"1 scelta su 3 viene sostituita con 'Evita' (nessun effetto positivo, +1 Super-Io).",cond:s=>s.superio>=7&&s.io<=4&&s.es<=5},
dipendenza:{name:"Disturbo da Dipendenza",desc:"L'ES cerca gratificazione immediata senza freni. Il piacere diventa l'unica ragione di vita.",effect:"+1 ES ogni 3 carte. Le scelte che alzano ES danno il doppio.",cond:s=>s.es>=9&&s.superio<=2},
somatizzazione:{name:"Disturbo Psicosomatico",desc:"Il corpo parla quando la mente non riesce. Dolori, stanchezza cronica, malesseri senza causa.",effect:"-1 a tutte le statistiche ogni 5 carte.",cond:s=>s.io<=4&&s.es>=5&&s.superio>=5},
dissociazione:{name:"Disturbo Dissociativo",desc:"La mente si disconnette da sé stessa per proteggersi. Depersonalizzazione, amnesia, distacco dalla realtà.",effect:"Alcune carte non hanno effetto (la mente si disconnette). -1 IO ogni 5 carte.",cond:s=>s.io<=3&&s.psychos.length>=2}
};

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function getPhase(age){if(age<13)return 0;if(age<25)return 1;if(age<45)return 2;if(age<70)return 3;return 4}
function updateStats(){
  document.getElementById('bar-es').style.width=(G.es*10)+'%';
  document.getElementById('bar-io').style.width=(G.io*10)+'%';
  document.getElementById('bar-superio').style.width=(G.superio*10)+'%';
  document.getElementById('val-es').textContent=G.es;
  document.getElementById('val-io').textContent=G.io;
  document.getElementById('val-superio').textContent=G.superio;
  document.getElementById('age-display').textContent='Età: '+G.age;
  document.getElementById('phase-label').textContent=PHASES[G.phase];
}
function renderBadges(){
  const bb=document.getElementById('bottom-bar');bb.innerHTML='';
  G.defenses.forEach(d=>{const b=document.createElement('div');b.className='badge defense';b.textContent=DEFENSES[d].name;b.onclick=()=>showModal('defense',d);bb.appendChild(b)});
  G.psychos.forEach(p=>{const b=document.createElement('div');b.className='badge psycho';b.textContent=PSYCHOS[p].name;b.onclick=()=>showModal('psycho',p);bb.appendChild(b)});
}
function showNotif(text,type,dur=2500){const n=document.getElementById('notif');n.textContent=text;n.className='notif '+type+' show';setTimeout(()=>n.classList.remove('show'),dur)}
function showModal(type,key){
  const data=type==='defense'?DEFENSES[key]:PSYCHOS[key];
  const ol=document.createElement('div');ol.className='overlay';
  ol.innerHTML=`<div class="modal"><h2>${data.name}</h2><p>${data.desc}</p><h3>Effetto in gioco</h3><p class="effect ${type==='psycho'?'neg-effect':''}">${data.effect}</p><button class="modal-close" onclick="this.closest('.overlay').remove()">Chiudi</button></div>`;
  document.body.appendChild(ol);
}
let deck=[];let currentCard=null;
function buildDeck(){deck=[];for(let p=G.phase;p<=4;p++)deck=deck.concat(shuffle(CARDS[p]))}
function drawCard(){
  if(!G.alive)return;
  let np=getPhase(G.age);if(np!==G.phase){G.phase=np;buildDeck()}
  let pc=deck.filter(c=>CARDS[G.phase].includes(c));
  if(pc.length===0){deck=deck.concat(shuffle(CARDS[G.phase]));pc=deck.filter(c=>CARDS[G.phase].includes(c))}
  currentCard=pc[0];deck=deck.filter(c=>c!==currentCard);renderCard(currentCard);
}
function renderCard(c){
  const area=document.getElementById('card-area');area.querySelectorAll('.card').forEach(e=>e.remove());
  const el=document.createElement('div');el.className='card';
  el.innerHTML=`<div class="card-phase">${PHASES[G.phase]} — ${G.age} anni</div><div class="card-title">${c.title}</div><div class="card-desc">${c.desc}</div><div class="card-divider">— &#10022; —</div><div class="card-choices"><button class="choice-btn left" data-dir="left">${c.l.text}</button><button class="choice-btn right" data-dir="right">${c.r.text}</button></div><div class="card-preview left" id="preview-left">&#9666; ${c.l.text}</div><div class="card-preview right" id="preview-right">${c.r.text} &#9656;</div>`;
  area.appendChild(el);setupCardInteraction(el,c);
}
function setupCardInteraction(el,card){
  let startX=0,dx=0,dragging=false;const threshold=80;
  function onStart(e){dragging=true;startX=e.touches?e.touches[0].clientX:e.clientX;el.classList.add('dragging')}
  function onMove(e){if(!dragging)return;const cx=e.touches?e.touches[0].clientX:e.clientX;dx=cx-startX;
    el.style.transform=`translateX(${dx}px) rotate(${dx*0.04}deg)`;
    const pl=el.querySelector('.card-preview.left'),pr=el.querySelector('.card-preview.right');
    const hl=document.getElementById('hint-left'),hr=document.getElementById('hint-right');
    if(dx<-30){pl.classList.add('show');pr.classList.remove('show');hl.style.opacity='0.6';hr.style.opacity='0'}
    else if(dx>30){pr.classList.add('show');pl.classList.remove('show');hr.style.opacity='0.6';hl.style.opacity='0'}
    else{pl.classList.remove('show');pr.classList.remove('show');hl.style.opacity='0';hr.style.opacity='0'}}
  function onEnd(){if(!dragging)return;dragging=false;el.classList.remove('dragging');
    document.getElementById('hint-left').style.opacity='0';document.getElementById('hint-right').style.opacity='0';
    if(dx<-threshold)choose('left',card,el);else if(dx>threshold)choose('right',card,el);
    else{el.style.transform='';el.querySelector('.card-preview.left').classList.remove('show');el.querySelector('.card-preview.right').classList.remove('show')}dx=0}
  el.addEventListener('mousedown',onStart);el.addEventListener('touchstart',onStart,{passive:true});
  document.addEventListener('mousemove',onMove);document.addEventListener('touchmove',onMove,{passive:true});
  document.addEventListener('mouseup',onEnd);document.addEventListener('touchend',onEnd);
  el.querySelectorAll('.choice-btn').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();choose(btn.dataset.dir,card,el)})});
}
function choose(dir,card,el){
  if(!G.alive)return;const choice=dir==='left'?card.l:card.r;
  let des=choice.es||0,dio=choice.io||0,dsup=choice.superio||0;
  if(G.defenses.includes('rimozione')&&dio<=-2)dio+=1;
  if(G.defenses.includes('umorismo')&&dio<0)dio+=1;
  if(G.defenses.includes('sublimazione')&&des>=2)dio+=1;
  if(G.defenses.includes('formazione_reattiva')&&des>0)dsup+=Math.min(des,1);
  if(G.defenses.includes('spostamento')&&dsup<0)dsup+=1;
  if(G.defenses.includes('razionalizzazione')&&des>0&&dsup<0)dsup=0;
  if(G.defenses.includes('proiezione')&&G.es>=8&&dsup<0)dsup=0;
  if(G.defenses.includes('scissione')){if(des>0)des+=1;if(des<0)des-=1;if(dio>0)dio+=1;if(dio<0)dio-=1;if(dsup>0)dsup+=1;if(dsup<0)dsup-=1}
  if(G.psychos.includes('ansia_generalizzata'))dio-=1;
  if(G.psychos.includes('depressione')){if(dio>0)dio=Math.ceil(dio/2);if(des>0)des=Math.ceil(des/2)}
  if(G.psychos.includes('dipendenza')&&des>0)des*=2;
  G.es=clamp(G.es+des);G.io=clamp(G.io+dio);G.superio=clamp(G.superio+dsup);
  if(G.defenses.includes('intellettualizzazione')&&G.superio<3)G.superio=3;
  if(G.defenses.includes('identificazione')&&G.es<3)G.es=3;
  if(G.defenses.includes('regressione')&&G.io<4)G.io=clamp(G.io+1);
  G.cards++;let ageGain=G.phase<=1?Math.floor(Math.random()*2)+2:Math.floor(Math.random()*3)+2;
  G.age+=ageGain;G.phase=getPhase(G.age);
  if(G.psychos.includes('narcisismo')&&G.cards%3===0)G.io=clamp(G.io-1);
  if(G.psychos.includes('nevrosi_ossessiva')&&G.cards%4===0)G.es=clamp(G.es-1);
  if(G.psychos.includes('isteria')&&G.cards%4===0)G.io=clamp(G.io-1);
  if(G.psychos.includes('ansia_generalizzata')&&G.cards%3===0)G.io=clamp(G.io-1);
  if(G.psychos.includes('depressione')&&G.cards%4===0){G.io=clamp(G.io-1);G.es=clamp(G.es-1)}
  if(G.psychos.includes('dipendenza')&&G.cards%3===0)G.es=clamp(G.es+1);
  if(G.psychos.includes('somatizzazione')&&G.cards%5===0){G.es=clamp(G.es-1);G.io=clamp(G.io-1);G.superio=clamp(G.superio-1)}
  if(G.psychos.includes('dissociazione')&&G.cards%5===0)G.io=clamp(G.io-1);
  if(G.psychos.includes('disturbo_borderline')&&G.cards%2===0){G.es=clamp(G.es+(Math.random()>.5?1:-1));G.io=clamp(G.io+(Math.random()>.5?1:-1));G.superio=clamp(G.superio+(Math.random()>.5?1:-1))}
  checkDefenses();checkPsychopathologies();
  el.style.transition='transform .3s ease, opacity .3s ease';
  el.style.transform=dir==='left'?'translateX(-120%) rotate(-12deg)':'translateX(120%) rotate(12deg)';el.style.opacity='0';
  updateStats();renderBadges();
  setTimeout(()=>{if(!G.alive)return;if(checkDeath())return;if(G.age>=100){endGame('natural');return}drawCard()},350);
}
function checkDefenses(){
  const conds={rimozione:()=>G.superio>=7&&G.es>=5&&!G.defenses.includes('rimozione'),proiezione:()=>G.es>=7&&G.io<=5&&!G.defenses.includes('proiezione'),sublimazione:()=>G.es>=6&&G.io>=6&&!G.defenses.includes('sublimazione'),umorismo:()=>G.io>=6&&G.cards>=8&&!G.defenses.includes('umorismo'),intellettualizzazione:()=>G.superio>=7&&G.io>=5&&!G.defenses.includes('intellettualizzazione'),negazione:()=>G.io<=4&&G.es>=5&&!G.defenses.includes('negazione'),regressione:()=>G.io<=4&&G.phase>=1&&!G.defenses.includes('regressione'),formazione_reattiva:()=>G.es>=7&&G.superio>=6&&!G.defenses.includes('formazione_reattiva'),spostamento:()=>G.es>=6&&G.superio<=4&&!G.defenses.includes('spostamento'),razionalizzazione:()=>G.superio>=6&&G.io>=5&&G.es<=5&&!G.defenses.includes('razionalizzazione'),identificazione:()=>G.es>=8&&G.io<=4&&!G.defenses.includes('identificazione'),scissione:()=>G.io<=3&&G.psychos.length>=1&&!G.defenses.includes('scissione')};
  for(const[k,fn]of Object.entries(conds)){if(fn()&&Math.random()<0.35){G.defenses.push(k);DEFENSES[k].fx(G);showNotif('Meccanismo acquisito: '+DEFENSES[k].name,'defense-notif',3000);setTimeout(()=>showModal('defense',k),500);break}}
}
function checkPsychopathologies(){
  for(const[k,p]of Object.entries(PSYCHOS)){if(!G.psychos.includes(k)&&p.cond(G)){if(G.defenses.includes('negazione')&&!G.deathSaves['negazione_psycho_'+k]){G.deathSaves['negazione_psycho_'+k]=true;continue}G.psychos.push(k);showNotif('Psicopatologia: '+p.name,'psycho-notif',3000);setTimeout(()=>showModal('psycho',k),500);break}}
}
function checkDeath(){
  if(G.io<=2){
    if(G.defenses.includes('umorismo')&&!G.deathSaves.umorismo){G.deathSaves.umorismo=true;G.io=4;showNotif("L'Umorismo ti salva dal collasso!",'save-notif',3000);updateStats();return false}
    if(G.defenses.includes('negazione')&&!G.deathSaves.negazione){G.deathSaves.negazione=true;G.io=4;showNotif('La Negazione ti salva dal collasso!','save-notif',3000);updateStats();return false}
    if(G.defenses.includes('proiezione')&&!G.deathSaves.proiezione){G.deathSaves.proiezione=true;G.io=4;showNotif('La Proiezione ti salva dal collasso!','save-notif',3000);updateStats();return false}
    endGame('collapse');return true}
  if(G.psychos.length>=4&&G.io<=4){endGame('psycho_overload');return true}return false}
function endGame(reason){
  G.alive=false;const screen=document.getElementById('gameover-screen'),title=document.getElementById('go-title'),cause=document.getElementById('go-cause'),summary=document.getElementById('go-summary');
  screen.classList.remove('natural');
  if(reason==='natural'){screen.classList.add('natural');title.textContent='UNA VITA VISSUTA';cause.textContent=`Hai raggiunto i ${G.age} anni. La tua vita è giunta al termine naturale.`}
  else if(reason==='collapse'){title.textContent='COLLASSO PSICHICO';cause.textContent=`A ${G.age} anni, l'Io è crollato. Le forze psichiche hanno travolto la tua capacità di mediazione con la realtà.`}
  else{title.textContent='DISGREGAZIONE';cause.textContent=`A ${G.age} anni, il peso di ${G.psychos.length} psicopatologie ha frantumato la tua psiche.`}
  let dt=G.defenses.length>0?G.defenses.map(d=>DEFENSES[d].name).join(', '):'Nessuno';
  let pt=G.psychos.length>0?G.psychos.map(p=>PSYCHOS[p].name).join(', '):'Nessuna';
  summary.innerHTML=`<b>ES:</b> ${G.es} | <b>IO:</b> ${G.io} | <b>SUPER-IO:</b> ${G.superio}<br><b>Meccanismi:</b> ${dt}<br><b>Psicopatologie:</b> ${pt}<br><b>Carte giocate:</b> ${G.cards}`;
  screen.classList.add('show')}
function startGame(){document.getElementById('title-screen').style.display='none';G={es:5,io:5,superio:5,age:5,phase:0,cards:0,defenses:[],psychos:[],alive:true,deathSaves:{}};buildDeck();updateStats();renderBadges();drawCard()}
function restartGame(){document.getElementById('gameover-screen').classList.remove('show');G={es:5,io:5,superio:5,age:5,phase:0,cards:0,defenses:[],psychos:[],alive:true,deathSaves:{}};buildDeck();updateStats();renderBadges();drawCard()}
</script>
